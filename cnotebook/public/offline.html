<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오프라인 - Character Notebook</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Pretendard Variable", sans-serif;
        background: #1c1917;
        color: #fafaf9;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1rem;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .icon {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }
      p {
        color: #a8a29e;
        font-size: 0.875rem;
        line-height: 1.5;
        margin-bottom: 1.5rem;
      }
      button {
        background: #b45309;
        color: white;
        border: none;
        padding: 0.625rem 1.5rem;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
      }
      button:active { opacity: 0.8; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">&#128214;</div>
      <h1>오프라인 상태입니다</h1>
      <p>인터넷 연결이 끊겼습니다.<br />연결이 복구되면 다시 시도해 주세요.</p>
      <button onclick="window.location.reload()">다시 시도</button>
    </div>
  </body>
</html>
